<!DOCTYPE html>
<html>
    <body>
        <header>Demo Site</header>
        <p>
            https://man-in-a-kayak.github.io/
            <br>
            https://github.com/man-in-a-kayak/man-in-a-kayak.github.io/
        </p>
        <p>Animation from my first time coding</p>

</html>

<canvas id="mycanvas" width="400" height="400"></canvas> 
<script src="https://cdn.jsdelivr.net/processing.js/1.4.8/processing.min.js"></script> 

<script>
    var programCode = function(processingInstance) {
        with (processingInstance) {
            size(400, 400); 
            frameRate(30);
      
            var x = 1;

            draw = function() {
                //Blue Sky
                    background(151, 244, 247);

                //Tan Dirt
                    noStroke();
                    fill(255, 233, 178);
                    rect(0, 225, 400, 175);

                //Shadow Quad 1
                    strokeWeight(1.0);
                    stroke(64, 58, 45);
                    fill(64, 58, 45);
                    quad(
                        175, 300,
                        175 + (cos(x)) * 150, 300 + (sin(x)) * 75,
                        225 + (cos(x)) * 150, 300 + (sin(x)) * 50,
                        225, 300
                    );

                //Shadow Quad 2
                    strokeWeight(1.0);
                    stroke(64, 58, 45);
                    fill(64, 58, 45);
                    quad(
                        125, 300,
                        125 + (cos(x)) * 150, 300 + (sin(x)) * 50,
                        175 + (cos(x)) * 150, 300 + (sin(x)) * 75,
                        175, 300
                    );

                //Shadow Quad 3
                    strokeWeight(1.0);
                    stroke(64, 58, 45);
                    fill(64, 58, 45);
                    quad(
                        175, 325,
                        175 + (cos(x)) * 150, 325 + (sin(x)) * 50,
                        225 + (cos(x)) * 150, 300 + (sin(x)) * 50,
                        225, 300
                    );

                //Shadow Quad 4
                    strokeWeight(1.0);
                    stroke(64, 58, 45);
                    fill(64, 58, 45);
                    quad(
                        125, 300,
                        125 + (cos(x)) * 150, 300 + (sin(x)) * 50,
                        175 + (cos(x)) * 150, 325 + (sin(x)) * 50,
                        175, 325
                    );

                //Shadow Quad 5
                    strokeWeight(1.0);
                    stroke(64, 58, 45);
                    fill(64, 58, 45);
                    quad(
                        175, 275,
                        175 + (cos(x)) * 150, 275 + (sin(x)) * 50,
                        225 + (cos(x)) * 150, 300 + (sin(x)) * 50,
                        225, 300
                    );

                //Shadow Quad 6
                    strokeWeight(1.0);
                    stroke(64, 58, 45);
                    fill(64, 58, 45);
                    quad(
                        125, 300,
                        125 + (cos(x)) * 150, 300 + (sin(x)) * 50,
                        175 + (cos(x)) * 150, 275 + (sin(x)) * 50,
                        175, 275
                    );

                //Obelisk Top Left
                    noStroke();
                    fill(
                        (cos( x+25 )*78)+138,
                        (cos( x+25 )*78)+188,
                        (cos( x+25 )*78)+138
                    );
                    triangle(125, 126, 175, 75, 175, 151);

                //Obelisk Top Right
                    noStroke();
                    fill(
                        (cos( x+20 )*78)+138,
                        (cos( x+20 )*78)+188,
                        (cos( x+20 )*78)+138
                    );
                    triangle(225, 126, 175, 75, 175, 151);

                //Obelisk Bottom Left
                    noStroke();
                    fill(
                        (cos( x )*78)+128,
                        (cos( x )*78)+178,
                        (cos( x )*78)+128
                    );
                    quad(125, 300, 125, 125, 175, 150, 175, 325);

                //Obelisk Bottom Right
                    noStroke();
                    fill(
                        (cos( x+20 )*78)+128,
                        (cos( x+20 )*78)+178,
                        (cos( x+20 )*78)+128
                    );
                    quad(175, 325, 175, 150, 225, 125, 225, 300);

                //Update positions
                    x += 0.025;
                    noStroke();
            };
        }
    };
    var canvas = document.getElementById("mycanvas"); 
    var processingInstance = new Processing(canvas, programCode); 
</script>
